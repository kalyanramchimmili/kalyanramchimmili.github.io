name: Generate LeetCode Docs

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: 'GitHub repo with LeetHub-pushed solutions (owner/name)'
        required: false
        default: 'kalyanramchimmili/leetcode'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout portfolio
        uses: actions/checkout@v6

      - name: Checkout LeetCode solutions
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.inputs.source_repo }}
          path: leetcode-solutions
          # If the source repo is private, set LEETCODE_REPO_TOKEN to a PAT with
          # repo:read scope. Public repos work with the default GITHUB_TOKEN.
          token: ${{ secrets.LEETCODE_REPO_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install google-genai

      - run: python scripts/gen_doc.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LEETCODE_SOLUTIONS_PATH: leetcode-solutions

      - uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "docs: AI-generated leetcode write-up(s)"
          title: "AI docs from ${{ github.event.inputs.source_repo }}"
          body: |
            Auto-generated by `scripts/gen_doc.py` from `${{ github.event.inputs.source_repo }}`.

            Review the markdown for accuracy (especially complexity claims) before merging.
          base: main
          branch: ai-docs/run-${{ github.run_id }}
          delete-branch: true
