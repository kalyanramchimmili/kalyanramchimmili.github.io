name: Generate LeetCode Docs

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install google-genai
      - run: python scripts/gen_doc.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      - uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "docs: AI-generated leetcode write-up(s)"
          title: "AI-generated leetcode write-up(s)"
          body: |
            Auto-generated by `scripts/gen_doc.py`.

            Review the markdown for accuracy (especially complexity claims) before merging.
          branch: ai-leetcode-docs
          delete-branch: true
